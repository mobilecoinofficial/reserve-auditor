---
name: shared-cd

env:
  DOCKERHUB_ORG: mobilecoin
  DOCKER_IMAGE: reserve-auditor
  CHART_REPO: https://harbor.mobilecoin.com/chartrepo/mobilecoinfoundation-public


on:
  push:
    branches:
      - adds-github-actions
      - release\/.*

jobs:
  docker:
    name: Docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Extract release branch
        shell: bash
        run: echo "RELEASE_NAME=$(echo ${GITHUB_REF##*/})" >> $GITHUB_ENV
        id: release_output

      - name: Generate Docker Tags
        id: docker_meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.DOCKERHUB_ORG }}/${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha

      - name: Setup Docker Buildx
        id: buildx
        if: "! contains(github.event.head_commit.message, '[skip docker]')"
        uses: docker/setup-buildx-action@v2
        with:
          install: true

      - name: Login to DockerHub
        if: "! contains(github.event.head_commit.message, '[skip docker]')"
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish to DockerHub
        uses: docker/build-push-action@v3
        if: "! contains(github.event.head_commit.message, '[skip docker]')"
        with:
          context: .
          file: Dockerfile
          labels: ${{ steps.docker_meta.outputs.labels }}
          tags: ${{env.DOCKERHUB_ORG}}/${{env.DOCKER_IMAGE}}:${{ env.RELEASE_NAME }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Package and publish chart
        if: "! contains(github.event.head_commit.message, '[skip charts]')"
        uses: mobilecoinofficial/gha-k8s-toolbox@a89efdf4305f3b926b1bb61a59f267532406e653
        with:
          action: helm-publish
          chart_repo_username: ${{ secrets.HARBOR_USERNAME }}
          chart_repo_password: ${{ secrets.HARBOR_PASSWORD }}
          chart_repo: ${{ env.CHART_REPO }}
          chart_app_version: ${{ env.RELEASE_NAME }}
          chart_version: ${{ env.RELEASE_NAME }}
          chart_path: ./deploy/charts/reserve-auditor

      - name: Create namespace
        uses: mobilecoinofficial/gha-k8s-toolbox@v1
        with:
          action: namespace-create
          namespace: testnet-reserve-auditor
          rancher_cluster: utility-r1-b-k8s
          rancher_url: ${{ secrets.RANCHER_URL }}
          rancher_token: ${{ secrets.RANCHER_TOKEN }}

      - name: Deploy environment setup
        uses: mobilecoinofficial/gha-k8s-toolbox@v1
        with:
          action: helm-deploy
          rancher_cluster: utility-r1-b-k8s
          namespace: testnet-reserve-auditor
          chart_repo: ${{ env.CHART_REPO }}
          chart_name: reserve-auditor
          chart_version: ${{ env.RELEASE_NAME }}
          release_name: testnet-reserve-auditor
          rancher_url: ${{ secrets.RANCHER_URL }}
          rancher_token: ${{ secrets.RANCHER_TOKEN }}
