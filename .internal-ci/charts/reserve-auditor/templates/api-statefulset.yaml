apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "reserve-auditor.fullname" . }}-api
  labels:
    {{- include "reserve-auditor.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "reserve-auditor.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  serviceName: {{ include "reserve-auditor.fullname" . }}-api
  template:
    metadata:
      annotations:
        {{- toYaml .Values.api.podAnnotations | nindent 8 }}
      labels:
        {{- include "reserve-auditor.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      containers:
      {{- with .Values.mobilecoind }}
      - name: mobilecoind-ledger-scanner
        securityContext: {}
        image: "{{ .image.repository }}:{{ .image.tag | default $.Chart.AppVersion }}"
        imagePullPolicy: Always
        env:
        - name: MC_LEDGER_DB_URL
          value: "{{ .ledgerDownloadUrl }}"
        - name: MC_WATCHER_DB_URL
          value: "{{ .watcherDownloadUrl }}"
        - name: "RUST_BACKTRACE"
          value: "full"
        - name: "RUST_LOG"
          value: "info,rustls=warn,hyper=warn,tokio_reactor=warn,mio=warn,want=warn,reqwest=warn,rusoto_core=error,rusoto_signature=error,h2=error"
        ports:
        - name: mobilecoind-rpc
          containerPort: 3229
        - name: http
          containerPort: 8080
          protocol: TCP
        # Need long startup probe to account for a full ledger download from empty
        startupProbe:
          grpc:
            port: 3229
          failureThreshold: 1800
          periodSeconds: 10
        livenessProbe:
          grpc:
            port: 3229
          failureThreshold: 3
          periodSeconds: 30
        readinessProbe:
          grpc:
            port: 3229
          failureThreshold: 4
          periodSeconds: 30
        volumeMounts:
        - name: data
          mountPath: /data/
        - name: supervisor-conf
          mountPath: /etc/supervisor/conf.d
        - name: gnosis-config
          mountPath: /config/gnosis
        resources:
          {{- toYaml .resources | nindent 12 }}
      {{- end }}
      securityContext: {}
      volumes:
      - name: gnosis-config
        configMap:
          name: {{ include "reserve-auditor.fullname" . }}-gnosis
      - name: supervisor-conf
        projected:
          sources:
          - configMap:
              name: {{ include "reserve-auditor.fullname" . }}-mobilecoind
          - configMap:
              name: {{ include "reserve-auditor.fullname" . }}-scanner
          - configMap:
              name: {{ include "reserve-auditor.fullname" . }}-httpserver
      {{- if not .Values.persistence.enabled }}
      - name: data
        emptyDir: {}
      {{- end }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
  volumeClaimTemplates:
    {{- if .Values.persistence.enabled }}
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: data
      spec:
        {{- toYaml .Values.persistence.pvcSpec | nindent 8 }}
    {{- end }}
